<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mirth Checker — Redirection</title>
    <!-- Thème (anti-flash : pose data-theme avant le rendu) -->
    <script>
        (function(){try{var t=localStorage.getItem("mc-theme");if(!t)t=matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();
    </script>
    <link rel="stylesheet" href="theme.css">
    <!-- Redirection automatique vers la page de statistiques -->
    <meta http-equiv="refresh" content="0; url=statistiques.html">
    <link rel="canonical" href="statistiques.html">
    <script>
        // Redirection immédiate (fallback si meta refresh est ignoré)
        window.location.replace("statistiques.html");
    </script>
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 0; }
    </style>
</head>
<body>
    <p>Redirection vers les <a href="statistiques.html">statistiques</a>…</p>
</body>
</html>
